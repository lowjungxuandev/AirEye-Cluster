apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: langfuse-secret
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: langfuse-secret
  refreshAfter: 30s
  destination:
    name: langfuse-secret
    create: true
    overwrite: true
    transformation:
      excludeRaw: true
      excludes:
        - .*
      templates:
        NEXTAUTH_SECRET:
          text: '{{ get .Secrets "NEXTAUTH_SECRET" }}'
        SALT:
          text: '{{ get .Secrets "SALT" }}'
        ENCRYPTION_KEY:
          text: '{{ get .Secrets "ENCRYPTION_KEY" }}'
        CLICKHOUSE_PASSWORD:
          text: '{{ get .Secrets "CLICKHOUSE_PASSWORD" }}'
        S3_ACCESS_KEY_ID:
          text: '{{ get .Secrets "S3_ACCESS_KEY_ID" }}'
        S3_SECRET_ACCESS_KEY:
          text: '{{ get .Secrets "S3_SECRET_ACCESS_KEY" }}'
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: langfuse-keycloak-oidc
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: grim-k8s
  refreshAfter: 30s
  destination:
    name: langfuse-keycloak-oidc
    create: true
    overwrite: true
    transformation:
      excludeRaw: true
      excludes:
        - .*
      templates:
        AUTH_KEYCLOAK_CLIENT_ID:
          text: '{{ get .Secrets "OIDC_CLIENT_ID" }}'
        AUTH_KEYCLOAK_CLIENT_SECRET:
          text: '{{ get .Secrets "OIDC_CLIENT_SECRET" }}'
