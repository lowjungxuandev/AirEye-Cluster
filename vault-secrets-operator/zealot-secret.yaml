apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: zealot-secret
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: grim-k8s
  refreshAfter: 30s
  destination:
    name: zealot-secret
    create: true
    overwrite: true
    transformation:
      excludeRaw: true
      excludes:
        - .*
      templates:
        ZEALOT_ADMIN_EMAIL:
          text: '{{ get .Secrets "ZEALOT_ADMIN_EMAIL" }}'
        ZEALOT_ADMIN_PASSWORD:
          text: '{{ get .Secrets "ZEALOT_ADMIN_PASSWORD" }}'
        SECRET_TOKEN:
          text: '{{ get .Secrets "ZEALOT_SECRET_TOKEN" }}'
        ZEALOT_POSTGRES_USERNAME:
          text: '{{ get .Secrets "POSTGRES_USER" }}'
        ZEALOT_POSTGRES_PASSWORD:
          text: '{{ get .Secrets "POSTGRES_PASSWORD" }}'
        OIDC_CLIENT_ID:
          text: '{{ get .Secrets "OIDC_CLIENT_ID" }}'
        OIDC_CLIENT_SECRET:
          text: '{{ get .Secrets "OIDC_CLIENT_SECRET" }}'
