apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  revisionHistoryLimit: 1
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: resume
  template:
    metadata:
      labels:
        app: resume
    spec:
      containers:
        - name: resume
          image: ghcr.io/amruthpillai/reactive-resume:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: resume-secret
          env:
            - name: PORT
              value: "3000"
            - name: TZ
              value: Etc/UTC
            - name: APP_URL
              value: https://resume.lowjungxuan.dpdns.org
            - name: S3_REGION
              value: us-east-1
            - name: S3_BUCKET
              value: resume
            - name: S3_ENDPOINT
              value: https://s3.lowjungxuan.dpdns.org
            - name: S3_FORCE_PATH_STYLE
              value: "true"
            - name: OAUTH_PROVIDER_NAME
              value: Keycloak
            - name: OAUTH_SCOPES
              value: openid profile email
            - name: OAUTH_DISCOVERY_URL
              value: https://keycloak.lowjungxuan.dpdns.org/realms/master/.well-known/openid-configuration
            - name: FLAG_DISABLE_SIGNUPS
              value: "true"
            - name: FLAG_DISABLE_EMAIL_AUTH
              value: "true"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 180
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 1500Mi
