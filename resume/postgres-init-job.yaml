apiVersion: batch/v1
kind: Job
metadata:
  name: resume-postgres-init
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: postgres:18-alpine
          env:
            - name: PGHOST
              value: postgres.infra.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: POSTGRES_PASSWORD
          command:
            - /bin/sh
            - -ec
          args:
            - |
              psql -d postgres -v ON_ERROR_STOP=1 <<'EOSQL'
              SELECT 'CREATE DATABASE resume'
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'resume')\gexec
              EOSQL
              psql -d resume -v ON_ERROR_STOP=1 <<'EOSQL'
              GRANT ALL ON SCHEMA public TO CURRENT_USER;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO CURRENT_USER;
              EOSQL
