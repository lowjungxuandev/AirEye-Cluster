apiVersion: batch/v1
kind: Job
metadata:
  name: resume-minio-init
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: MINIO_ROOT_PASSWORD
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: resume-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: resume-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: MC_HOST_local
              value: http://$(MINIO_ROOT_USER):$(MINIO_ROOT_PASSWORD)@minio.infra.svc.cluster.local:9000
          command:
            - /bin/sh
            - -ec
          args:
            - |
              mc mb --ignore-existing local/resume

              # `mc admin user add` is upsert — creates or replaces the
              # secret key, so this also rotates if Vault changed.
              mc admin user add local "$S3_ACCESS_KEY_ID" "$S3_SECRET_ACCESS_KEY"
              mc admin user enable local "$S3_ACCESS_KEY_ID"

              cat > /tmp/resume-rw.json <<'EOF'
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["s3:*"],
                    "Resource": ["arn:aws:s3:::resume", "arn:aws:s3:::resume/*"]
                  }
                ]
              }
              EOF
              mc admin policy create local resume-rw /tmp/resume-rw.json 2>/dev/null \
                || mc admin policy update local resume-rw /tmp/resume-rw.json
              mc admin policy attach local resume-rw --user "$S3_ACCESS_KEY_ID" 2>/dev/null || true
