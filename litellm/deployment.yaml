apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  revisionHistoryLimit: 1
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      annotations:
        litellm.lowjungxuan.dpdns.org/sso-config-revision: "1"
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:v1.83.14-stable.patch.3
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /app/config.yaml
            - --host
            - 0.0.0.0
            - --port
            - "4000"
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - secretRef:
                name: litellm-secret
          env:
            - name: STORE_MODEL_IN_DB
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 180
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: litellm-config
