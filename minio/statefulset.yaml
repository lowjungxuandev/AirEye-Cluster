apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BROWSER_REDIRECT_URL
              value: https://minio.lowjungxuan.dpdns.org
            - name: MINIO_IDENTITY_OPENID_CONFIG_URL
              value: https://keycloak.lowjungxuan.dpdns.org/realms/master/.well-known/openid-configuration
            - name: MINIO_IDENTITY_OPENID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: MINIO_OIDC_CLIENT_ID
            - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: MINIO_OIDC_CLIENT_SECRET
            - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME
              value: Keycloak
            - name: MINIO_IDENTITY_OPENID_CLAIM_NAME
              value: preferred_username
            - name: MINIO_IDENTITY_OPENID_REDIRECT_URI
              value: https://minio.lowjungxuan.dpdns.org/oauth_callback
            - name: MINIO_IDENTITY_OPENID_SCOPES
              value: openid,email,profile
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 1
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
