apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
          args:
            - server
            - /data
            - --console-address
            - :9001
          envFrom:
            - secretRef:
                name: server-secret
          env:
            - name: MINIO_BROWSER_REDIRECT_URL
              value: https://minio.lowjungxuan.dpdns.org
            - name: MINIO_IDENTITY_OPENID_CONFIG_URL
              value: https://keycloak.lowjungxuan.dpdns.org/realms/master/.well-known/openid-configuration
            - name: MINIO_IDENTITY_OPENID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: MINIO_OIDC_CLIENT_ID
            - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: MINIO_OIDC_CLIENT_SECRET
            - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME
              value: Keycloak
            - name: MINIO_IDENTITY_OPENID_CLAIM_NAME
              value: policy
            - name: MINIO_IDENTITY_OPENID_SCOPES
              value: openid,email,profile
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
