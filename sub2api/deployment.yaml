apiVersion: apps/v1
kind: Deployment
metadata:
  name: sub2api
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: sub2api
  template:
    metadata:
      labels:
        app: sub2api
    spec:
      containers:
        - name: sub2api
          image: ghcr.io/wei-shaw/sub2api:0.1.126
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: server-secret
          env:
            - name: OIDC_CONNECT_ENABLED
              value: "true"
            - name: OIDC_CONNECT_PROVIDER_NAME
              value: Keycloak
            - name: OIDC_CONNECT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: OIDC_CLIENT_ID
            - name: OIDC_CONNECT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_CONNECT_ISSUER_URL
              value: https://keycloak.lowjungxuan.dpdns.org/realms/master
            - name: OIDC_CONNECT_DISCOVERY_URL
              value: https://keycloak.lowjungxuan.dpdns.org/realms/master/.well-known/openid-configuration
            - name: OIDC_CONNECT_SCOPES
              value: openid email profile
            - name: OIDC_CONNECT_REDIRECT_URL
              value: https://sub2api.lowjungxuan.dpdns.org/api/v1/auth/oauth/oidc/callback
            - name: OIDC_CONNECT_FRONTEND_REDIRECT_URL
              value: /auth/oidc/callback
            - name: OIDC_CONNECT_TOKEN_AUTH_METHOD
              value: client_secret_post
            - name: OIDC_CONNECT_USE_PKCE
              value: "false"
            - name: OIDC_CONNECT_VALIDATE_ID_TOKEN
              value: "true"
            - name: OIDC_CONNECT_ALLOWED_SIGNING_ALGS
              value: RS256,ES256,PS256
            - name: OIDC_CONNECT_CLOCK_SKEW_SECONDS
              value: "120"
            - name: OIDC_CONNECT_REQUIRE_EMAIL_VERIFIED
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
