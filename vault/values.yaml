global:
  enabled: true
  tlsDisable: true

injector:
  enabled: false

server:
  enabled: true
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 500m
  dataStorage:
    enabled: false
  standalone:
    enabled: true
    config: |-
      ui = true
      listener "tcp" {
        tls_disable     = 1
        address         = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "postgresql" {
        ha_enabled = "true"
      }
  extraSecretEnvironmentVars:
    - envName: VAULT_PG_CONNECTION_URL
      secretName: server-secret
      secretKey: VAULT_PG_CONNECTION_URL
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
    hosts:
      - host: vault.lowjungxuan.dpdns.org
        paths: ["/"]
    tls:
      - secretName: vault-tls
        hosts: [vault.lowjungxuan.dpdns.org]
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
  affinity: ""

ui:
  enabled: true
