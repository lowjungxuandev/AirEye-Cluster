apiVersion: batch/v1
kind: Job
metadata:
  name: vault-seed-secrets
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: vault-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: alpine/k8s:1.33.4
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until kubectl exec -n infra vault-0 -- vault status 2>/tmp/status | grep -q "Sealed.*false"; do
                sleep 5
              done

              ROOT_TOKEN=$(kubectl get secret -n infra vault-bootstrap-secret -o jsonpath='{.data.VAULT_ROOT_TOKEN}' | base64 -d)

              # Reads the key from the pre-created server-secret; falls back to a random value if absent.
              keep_or() {
                V=$(kubectl get secret -n infra server-secret -o jsonpath="{.data.$1}" 2>/dev/null || true)
                if [ -n "$V" ]; then printf '%s' "$V" | base64 -d
                else tr -dc 'A-Za-z0-9' </dev/urandom | head -c 48
                fi
              }

              # Reads from the pre-created grim-app-secret K8s secret; no fallback (key must exist).
              keep_or_app() {
                kubectl get secret -n infra grim-app-secret -o jsonpath="{.data.$1}" 2>/dev/null | base64 -d
              }

              kubectl exec -n infra vault-0 -- sh -ec "VAULT_TOKEN='$ROOT_TOKEN' vault secrets enable -path=secret kv-v2 || true"

              kubectl exec -n infra vault-0 -- sh -ec "VAULT_TOKEN='$ROOT_TOKEN' vault kv put secret/grim-k8s \
                POSTGRES_USER='$(keep_or POSTGRES_USER)' \
                POSTGRES_PASSWORD='$(keep_or POSTGRES_PASSWORD)' \
                POSTGRES_DB='$(keep_or POSTGRES_DB)' \
                KEYCLOAK_DB_PASSWORD='$(keep_or KEYCLOAK_DB_PASSWORD)' \
                VAULT_DB_PASSWORD='$(keep_or VAULT_DB_PASSWORD)' \
                VAULT_PG_CONNECTION_URL='$(keep_or VAULT_PG_CONNECTION_URL)' \
                KC_DB='$(keep_or KC_DB)' \
                KC_DB_URL='$(keep_or KC_DB_URL)' \
                KC_DB_USERNAME='$(keep_or KC_DB_USERNAME)' \
                KEYCLOAK_ADMIN='$(keep_or KEYCLOAK_ADMIN)' \
                KEYCLOAK_ADMIN_PASSWORD='$(keep_or KEYCLOAK_ADMIN_PASSWORD)' \
                KEYCLOAK_USER_USERNAME='$(keep_or KEYCLOAK_USER_USERNAME)' \
                KEYCLOAK_USER_PASSWORD='$(keep_or KEYCLOAK_USER_PASSWORD)' \
                KEYCLOAK_USER_EMAIL='$(keep_or KEYCLOAK_USER_EMAIL)' \
                OIDC_CLIENT_ID='$(keep_or OIDC_CLIENT_ID)' \
                OIDC_CLIENT_SECRET='$(keep_or OIDC_CLIENT_SECRET)' \
                REDIS_PASSWORD='$(keep_or REDIS_PASSWORD)' \
                ARGOCD_OIDC_CLIENT_ID='$(keep_or ARGOCD_OIDC_CLIENT_ID)' \
                ARGOCD_OIDC_CLIENT_SECRET='$(keep_or ARGOCD_OIDC_CLIENT_SECRET)' \
                MINIO_ROOT_USER='$(keep_or MINIO_ROOT_USER)' \
                MINIO_ROOT_PASSWORD='$(keep_or MINIO_ROOT_PASSWORD)' \
                MINIO_OIDC_CLIENT_ID='$(keep_or MINIO_OIDC_CLIENT_ID)' \
                MINIO_OIDC_CLIENT_SECRET='$(keep_or MINIO_OIDC_CLIENT_SECRET)'"

              # Seed grim-app-secret only on first run; preserves any edits made via the Vault UI.
              if kubectl exec -n infra vault-0 -- sh -ec "VAULT_TOKEN='$ROOT_TOKEN' vault kv get secret/grim-app-secret" >/dev/null 2>&1; then
                echo "secret/grim-app-secret already exists, skipping seed"
              else
                kubectl exec -n infra vault-0 -- sh -ec "VAULT_TOKEN='$ROOT_TOKEN' vault kv put secret/grim-app-secret \
                  DEEPSEEK_API_KEY='$(keep_or_app DEEPSEEK_API_KEY)' \
                  DEEPSEEK_BASE_URL='$(keep_or_app DEEPSEEK_BASE_URL)' \
                  DEEPSEEK_EXTRACT_MODEL='$(keep_or_app DEEPSEEK_EXTRACT_MODEL)' \
                  DEEPSEEK_FINAL_MODEL='$(keep_or_app DEEPSEEK_FINAL_MODEL)' \
                  DEV_FORCE_KILL_PORT='$(keep_or_app DEV_FORCE_KILL_PORT)' \
                  FIREBASE_DATABASE_URL='$(keep_or_app FIREBASE_DATABASE_URL)' \
                  FIREBASE_PROJECT_ID='$(keep_or_app FIREBASE_PROJECT_ID)' \
                  GOOGLE_APPLICATION_CREDENTIALS='$(keep_or_app GOOGLE_APPLICATION_CREDENTIALS)' \
                  GRIM_FCM_TOPIC='$(keep_or_app GRIM_FCM_TOPIC)' \
                  NVIDIA_API_KEY='$(keep_or_app NVIDIA_API_KEY)' \
                  NVIDIA_BASE_URL='$(keep_or_app NVIDIA_BASE_URL)' \
                  NVIDIA_EXTRACT_MODEL='$(keep_or_app NVIDIA_EXTRACT_MODEL)' \
                  NVIDIA_FINAL_MODEL='$(keep_or_app NVIDIA_FINAL_MODEL)' \
                  OPENAI_API_KEY='$(keep_or_app OPENAI_API_KEY)' \
                  OPENAI_BASE_URL='$(keep_or_app OPENAI_BASE_URL)' \
                  OPENAI_EXTRACT_MODEL='$(keep_or_app OPENAI_EXTRACT_MODEL)' \
                  OPENAI_FINAL_MODEL='$(keep_or_app OPENAI_FINAL_MODEL)' \
                  OPENROUTER_API_KEY='$(keep_or_app OPENROUTER_API_KEY)' \
                  OPENROUTER_BASE_URL='$(keep_or_app OPENROUTER_BASE_URL)' \
                  OPENROUTER_EXTRACT_MODEL='$(keep_or_app OPENROUTER_EXTRACT_MODEL)' \
                  OPENROUTER_FINAL_MODEL='$(keep_or_app OPENROUTER_FINAL_MODEL)' \
                  PORT='$(keep_or_app PORT)' \
                  S3_ACCESS_KEY_ID='$(keep_or_app S3_ACCESS_KEY_ID)' \
                  S3_BUCKET_DEVELOPMENT='$(keep_or_app S3_BUCKET_DEVELOPMENT)' \
                  S3_BUCKET_PRODUCTION='$(keep_or_app S3_BUCKET_PRODUCTION)' \
                  S3_BUCKET_TESTING='$(keep_or_app S3_BUCKET_TESTING)' \
                  S3_ENDPOINT='$(keep_or_app S3_ENDPOINT)' \
                  S3_PRESIGN_TTL_SECONDS='$(keep_or_app S3_PRESIGN_TTL_SECONDS)' \
                  S3_REGION='$(keep_or_app S3_REGION)' \
                  S3_SECRET_ACCESS_KEY='$(keep_or_app S3_SECRET_ACCESS_KEY)'"
              fi
