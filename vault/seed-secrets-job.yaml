apiVersion: batch/v1
kind: Job
metadata:
  name: vault-seed-secrets
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: vault-bootstrap
      restartPolicy: OnFailure
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      containers:
        - name: vault-seed-secrets
          image: alpine/k8s:1.33.4
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until kubectl exec vault-0 -- vault status 2>/tmp/status | grep -q "Sealed.*false"; do
                sleep 5
              done

              ROOT_TOKEN=$(kubectl get secret vault-bootstrap-secret -o jsonpath='{.data.VAULT_ROOT_TOKEN}' | base64 -d)

              get_secret() {
                kubectl get secret "$1" -o jsonpath="{.data.$2}" | base64 -d
              }

              get_secret_value() {
                VALUE=$(kubectl get secret server-secret -o jsonpath="{.data.$1}" 2>/dev/null || true)
                if [ -n "$VALUE" ]; then
                  printf '%s' "$VALUE" | base64 -d
                else
                  get_secret "$2" "${3:-$1}"
                fi
              }

              get_existing_or_generate() {
                VALUE=$(kubectl get secret server-secret -o jsonpath="{.data.$1}" 2>/dev/null || true)
                if [ -n "$VALUE" ]; then
                  printf '%s' "$VALUE" | base64 -d
                else
                  tr -dc 'A-Za-z0-9' </dev/urandom | head -c "${2:-48}"
                fi
              }

              get_existing_or_default() {
                VALUE=$(kubectl get secret server-secret -o jsonpath="{.data.$1}" 2>/dev/null || true)
                if [ -n "$VALUE" ]; then
                  printf '%s' "$VALUE" | base64 -d
                else
                  printf '%s' "$2"
                fi
              }

              kubectl exec vault-0 -- sh -ec "VAULT_TOKEN='$ROOT_TOKEN' vault secrets enable -path=secret kv-v2 || true"

              kubectl exec vault-0 -- sh -ec "VAULT_TOKEN='$ROOT_TOKEN' vault kv metadata delete secret/grim-k8s/all-secrets || true"

              kubectl exec vault-0 -- sh -ec "VAULT_TOKEN='$ROOT_TOKEN' vault kv put secret/grim-k8s \
                POSTGRES_USER='$(get_secret_value POSTGRES_USER postgres-secret)' \
                POSTGRES_PASSWORD='$(get_secret_value POSTGRES_PASSWORD postgres-secret)' \
                KEYCLOAK_DB_PASSWORD='$(get_secret_value KEYCLOAK_DB_PASSWORD postgres-secret)' \
                VAULT_DB_PASSWORD='$(get_secret_value VAULT_DB_PASSWORD postgres-secret)' \
                KEYCLOAK_ADMIN_PASSWORD='$(get_secret_value KEYCLOAK_ADMIN_PASSWORD keycloak-admin-secret password)' \
                KC_DB='$(get_secret_value KC_DB keycloak-env-secret)' \
                KC_DB_URL='$(get_secret_value KC_DB_URL keycloak-env-secret)' \
                KC_DB_USERNAME='$(get_secret_value KC_DB_USERNAME keycloak-env-secret)' \
                KEYCLOAK_ADMIN='$(get_secret_value KEYCLOAK_ADMIN keycloak-env-secret)' \
                POSTGRES_DB='$(get_secret_value POSTGRES_DB postgres-env-secret)' \
                VAULT_PG_CONNECTION_URL='$(get_secret_value VAULT_PG_CONNECTION_URL vault-env-secret)' \
                KEYCLOAK_USER_USERNAME='$(get_secret_value KEYCLOAK_USER_USERNAME keycloak-user-secret)' \
                KEYCLOAK_USER_PASSWORD='$(get_secret_value KEYCLOAK_USER_PASSWORD keycloak-user-secret)' \
                KEYCLOAK_USER_EMAIL='$(get_secret_value KEYCLOAK_USER_EMAIL keycloak-user-secret)' \
                OIDC_CLIENT_ID='$(get_secret_value OIDC_CLIENT_ID vault-keycloak-secret)' \
                OIDC_CLIENT_SECRET='$(get_secret_value OIDC_CLIENT_SECRET vault-keycloak-secret)' \
                REDIS_PASSWORD='$(get_existing_or_generate REDIS_PASSWORD 48)' \
                ARGOCD_OIDC_CLIENT_ID='$(get_existing_or_default ARGOCD_OIDC_CLIENT_ID argocd)' \
                ARGOCD_OIDC_CLIENT_SECRET='$(get_existing_or_generate ARGOCD_OIDC_CLIENT_SECRET 48)'"

              for path in \
                postgres-secret \
                keycloak-admin-secret \
                keycloak-env-secret \
                postgres-env-secret \
                vault-env-secret \
                keycloak-user-secret \
                vault-keycloak-secret \
                all-secrets; do
                kubectl exec vault-0 -- sh -ec "VAULT_TOKEN='$ROOT_TOKEN' vault kv metadata delete secret/grim-k8s/$path || true"
              done
