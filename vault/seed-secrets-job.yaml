apiVersion: batch/v1
kind: Job
metadata:
  name: vault-seed-secrets
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: vault-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: alpine/k8s:1.33.4
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until kubectl exec vault-0 -- vault status 2>/tmp/status | grep -q "Sealed.*false"; do
                sleep 5
              done

              ROOT_TOKEN=$(kubectl get secret vault-bootstrap-secret -o jsonpath='{.data.VAULT_ROOT_TOKEN}' | base64 -d)

              # If a key already exists in server-secret, preserve it; otherwise use $2 (default) or generate.
              keep_or() {
                V=$(kubectl get secret server-secret -o jsonpath="{.data.$1}" 2>/dev/null || true)
                if [ -n "$V" ]; then printf '%s' "$V" | base64 -d
                elif [ -n "$2" ]; then printf '%s' "$2"
                else tr -dc 'A-Za-z0-9' </dev/urandom | head -c 48
                fi
              }

              kubectl exec vault-0 -- sh -ec "VAULT_TOKEN='$ROOT_TOKEN' vault secrets enable -path=secret kv-v2 || true"

              kubectl exec vault-0 -- sh -ec "VAULT_TOKEN='$ROOT_TOKEN' vault kv put secret/grim-k8s \
                POSTGRES_USER='$(keep_or POSTGRES_USER admin)' \
                POSTGRES_PASSWORD='$(keep_or POSTGRES_PASSWORD)' \
                POSTGRES_DB='$(keep_or POSTGRES_DB grim)' \
                KEYCLOAK_DB_PASSWORD='$(keep_or KEYCLOAK_DB_PASSWORD)' \
                VAULT_DB_PASSWORD='$(keep_or VAULT_DB_PASSWORD)' \
                VAULT_PG_CONNECTION_URL='$(keep_or VAULT_PG_CONNECTION_URL)' \
                KC_DB='$(keep_or KC_DB postgres)' \
                KC_DB_URL='$(keep_or KC_DB_URL jdbc:postgresql://postgres.infra.svc.cluster.local:5432/keycloak)' \
                KC_DB_USERNAME='$(keep_or KC_DB_USERNAME keycloak)' \
                KEYCLOAK_ADMIN='$(keep_or KEYCLOAK_ADMIN admin)' \
                KEYCLOAK_ADMIN_PASSWORD='$(keep_or KEYCLOAK_ADMIN_PASSWORD)' \
                KEYCLOAK_USER_USERNAME='$(keep_or KEYCLOAK_USER_USERNAME)' \
                KEYCLOAK_USER_PASSWORD='$(keep_or KEYCLOAK_USER_PASSWORD)' \
                KEYCLOAK_USER_EMAIL='$(keep_or KEYCLOAK_USER_EMAIL)' \
                OIDC_CLIENT_ID='$(keep_or OIDC_CLIENT_ID vault)' \
                OIDC_CLIENT_SECRET='$(keep_or OIDC_CLIENT_SECRET)' \
                REDIS_PASSWORD='$(keep_or REDIS_PASSWORD)' \
                ARGOCD_OIDC_CLIENT_ID='$(keep_or ARGOCD_OIDC_CLIENT_ID argocd)' \
                ARGOCD_OIDC_CLIENT_SECRET='$(keep_or ARGOCD_OIDC_CLIENT_SECRET)' \
                MINIO_ROOT_USER='$(keep_or MINIO_ROOT_USER minioadmin)' \
                MINIO_ROOT_PASSWORD='$(keep_or MINIO_ROOT_PASSWORD)' \
                MINIO_OIDC_CLIENT_ID='$(keep_or MINIO_OIDC_CLIENT_ID minio)' \
                MINIO_OIDC_CLIENT_SECRET='$(keep_or MINIO_OIDC_CLIENT_SECRET)'"
