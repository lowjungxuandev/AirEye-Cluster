apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-auto-unseal
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: vault-bootstrap
          restartPolicy: OnFailure
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
          containers:
            - name: vault-auto-unseal
              image: alpine/k8s:1.33.4
              command:
                - /bin/sh
                - -ec
              args:
                - |
                  if ! kubectl exec vault-0 -- vault status >/tmp/status 2>&1; then
                    cat /tmp/status
                    exit 0
                  fi

                  if grep -q "Initialized.*true" /tmp/status && grep -q "Sealed.*true" /tmp/status; then
                    UNSEAL_KEY=$(kubectl get secret vault-bootstrap-secret -o jsonpath='{.data.VAULT_UNSEAL_KEY}' | base64 -d)
                    kubectl exec vault-0 -- vault operator unseal "$UNSEAL_KEY"
                  fi
