apiVersion: batch/v1
kind: Job
metadata:
  name: vault-auth-config
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-bootstrap
      containers:
        - name: configure
          image: alpine/k8s:1.36.0
          envFrom:
            - secretRef:
                name: server-secret
          command:
            - /bin/sh
            - -ec
          args:
            - |
              ROOT_TOKEN=$(kubectl get secret -n infra vault-bootstrap-secret \
                -o jsonpath='{.data.VAULT_ROOT_TOKEN}' | base64 -d)

              ve() {
                kubectl exec -n infra vault-0 -- env VAULT_TOKEN="$ROOT_TOKEN" "$@"
              }

              until ve vault status >/dev/null 2>&1; do
                sleep 5
              done

              ve vault secrets enable -path=secret kv-v2 >/dev/null 2>&1 || true

              kubectl exec -n infra vault-0 -- sh -ec "cat > /tmp/aireye-cluster-read.hcl <<'EOF'
              path \"secret/metadata\"                { capabilities = [\"list\"] }
              path \"secret/metadata/aireye-cluster\"       { capabilities = [\"list\", \"read\"] }
              path \"secret/metadata/aireye-cluster/*\"     { capabilities = [\"list\", \"read\"] }
              path \"secret/metadata/aireye-app-secret\" { capabilities = [\"list\", \"read\"] }
              path \"secret/metadata/langfuse-secret\" { capabilities = [\"list\", \"read\"] }
              path \"secret/data/aireye-cluster\"           { capabilities = [\"read\"] }
              path \"secret/data/aireye-cluster/*\"         { capabilities = [\"read\"] }
              path \"secret/data/aireye-app-secret\"    { capabilities = [\"create\", \"read\", \"update\"] }
              path \"secret/data/langfuse-secret\"    { capabilities = [\"read\"] }
              path \"secret/metadata/resume-secret\"  { capabilities = [\"list\", \"read\"] }
              path \"secret/data/resume-secret\"      { capabilities = [\"read\"] }
              path \"auth/oidc/role/keycloak\"        { capabilities = [\"read\"] }
              EOF
              VAULT_TOKEN='$ROOT_TOKEN' vault policy write aireye-cluster-read /tmp/aireye-cluster-read.hcl"

              ve vault auth enable kubernetes >/dev/null 2>&1 || true
              ve vault write auth/kubernetes/config \
                kubernetes_host=https://kubernetes.default.svc
              ve vault write auth/kubernetes/role/vso-aireye-cluster \
                bound_service_account_names=vault-secrets-operator \
                bound_service_account_namespaces=infra,argocd \
                policies=aireye-cluster-read \
                audience=vault \
                ttl=1h

              ve vault auth enable oidc >/dev/null 2>&1 || true
              ve vault auth tune -listing-visibility=unauth oidc
              ve vault write auth/oidc/config \
                oidc_discovery_url=https://keycloak.lowjungxuan.dpdns.org/realms/master \
                oidc_client_id="$OIDC_CLIENT_ID" \
                oidc_client_secret="$OIDC_CLIENT_SECRET" \
                default_role=keycloak
              ve vault write auth/oidc/role/keycloak \
                role_type=oidc \
                user_claim=preferred_username \
                oidc_scopes=openid,email,profile \
                allowed_redirect_uris=https://vault.lowjungxuan.dpdns.org/ui/vault/auth/oidc/oidc/callback,http://localhost:8250/oidc/callback \
                policies=default,aireye-cluster-read \
                ttl=1h
