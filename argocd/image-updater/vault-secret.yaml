apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: argocd-image-updater-git-creds
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: argocd-image-updater-git-creds
  refreshAfter: 30s
  destination:
    name: argocd-image-updater-git-creds
    create: true
    overwrite: true
  rolloutRestartTargets:
    - kind: Deployment
      name: argocd-image-updater-controller
