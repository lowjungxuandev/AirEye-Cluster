apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.1/manifests/install.yaml
  - secrets.yaml
  - ingress.yaml

patches:
  - path: patches/config.yaml
  - path: patches/delete-bundled-redis.yaml
  - path: patches/tolerations.yaml
    target:
      kind: (Deployment|StatefulSet)
      labelSelector: app.kubernetes.io/part-of=argocd
