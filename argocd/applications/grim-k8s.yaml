apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grim-k8s
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/lowjungxuandev/GRIM-K8S
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
      jqPathExpressions:
        - .metadata.annotations."app.kubernetes.io/managed-by"
        - .metadata.labels."app.kubernetes.io/managed-by"
