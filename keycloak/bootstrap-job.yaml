apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-bootstrap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: quay.io/keycloak/keycloak:26.6.1
          envFrom:
            - secretRef:
                name: server-secret
          command:
            - /bin/sh
            - -ec
          args:
            - |
              KCADM=/opt/keycloak/bin/kcadm.sh
              SERVER=http://keycloak.infra.svc.cluster.local
              REALM=master

              # First run: temp bootstrap admin (KEYCLOAK_ADMIN) exists.
              # Subsequent runs: it's been deleted; fall back to the
              # permanent admin (KEYCLOAK_USER_USERNAME).
              if ! "$KCADM" config credentials \
                  --server "$SERVER" --realm "$REALM" \
                  --user "$KEYCLOAK_ADMIN" \
                  --password "$KEYCLOAK_ADMIN_PASSWORD" >/dev/null 2>&1; then
                "$KCADM" config credentials \
                  --server "$SERVER" --realm "$REALM" \
                  --user "$KEYCLOAK_USER_USERNAME" \
                  --password "$KEYCLOAK_USER_PASSWORD"
              fi

              upsert_user() {
                USER_ID=$("$KCADM" get users -r "$REALM" -q username="$KEYCLOAK_USER_USERNAME" --fields id --format csv --noquotes | head -n 1)
                if [ -z "$USER_ID" ]; then
                  USER_ID=$("$KCADM" get users -r "$REALM" -q email="$KEYCLOAK_USER_EMAIL" --fields id --format csv --noquotes | head -n 1)
                fi
                if [ -z "$USER_ID" ]; then
                  "$KCADM" create users -r "$REALM" \
                    -s username="$KEYCLOAK_USER_USERNAME" \
                    -s enabled=true \
                    -s email="$KEYCLOAK_USER_EMAIL" \
                    -s emailVerified=true
                  USER_ID=$("$KCADM" get users -r "$REALM" -q username="$KEYCLOAK_USER_USERNAME" --fields id --format csv --noquotes | head -n 1)
                else
                  "$KCADM" update "users/$USER_ID" -r "$REALM" \
                    -s username="$KEYCLOAK_USER_USERNAME" \
                    -s email="$KEYCLOAK_USER_EMAIL" \
                    -s emailVerified=true \
                    -s enabled=true
                fi
                "$KCADM" set-password -r "$REALM" --userid "$USER_ID" --new-password "$KEYCLOAK_USER_PASSWORD"
              }

              upsert_client() {
                CLIENT_ID=$1
                CLIENT_SECRET=$2
                REDIRECT_URIS=$3
                WEB_ORIGINS=$4
                UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$CLIENT_ID" --fields id --format csv --noquotes | head -n 1)
                if [ -z "$UUID" ]; then
                  "$KCADM" create clients -r "$REALM" \
                    -s clientId="$CLIENT_ID" \
                    -s enabled=true \
                    -s protocol=openid-connect \
                    -s publicClient=false \
                    -s clientAuthenticatorType=client-secret \
                    -s secret="$CLIENT_SECRET" \
                    -s standardFlowEnabled=true \
                    -s directAccessGrantsEnabled=true \
                    -s "redirectUris=$REDIRECT_URIS" \
                    -s "webOrigins=$WEB_ORIGINS" >&2
                  UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$CLIENT_ID" --fields id --format csv --noquotes | head -n 1)
                else
                  "$KCADM" update "clients/$UUID" -r "$REALM" \
                    -s enabled=true \
                    -s protocol=openid-connect \
                    -s publicClient=false \
                    -s clientAuthenticatorType=client-secret \
                    -s secret="$CLIENT_SECRET" \
                    -s standardFlowEnabled=true \
                    -s directAccessGrantsEnabled=true \
                    -s "redirectUris=$REDIRECT_URIS" \
                    -s "webOrigins=$WEB_ORIGINS" >&2
                fi
                printf '%s' "$UUID"
              }

              upsert_minio_policy_mapper() {
                UUID=$1
                MAPPER_ID=$("$KCADM" get "clients/$UUID/protocol-mappers/models" -r "$REALM" --fields id,name --format csv --noquotes | sed -n 's/,minio-policy$//p' | head -n 1)
                if [ -z "$MAPPER_ID" ]; then
                  "$KCADM" create "clients/$UUID/protocol-mappers/models" -r "$REALM" \
                    -s name=minio-policy \
                    -s protocol=openid-connect \
                    -s protocolMapper=oidc-hardcoded-claim-mapper \
                    -s 'config."claim.name"=policy' \
                    -s 'config."claim.value"=consoleAdmin' \
                    -s 'config."jsonType.label"=String' \
                    -s 'config."access.token.claim"=true' \
                    -s 'config."id.token.claim"=true' \
                    -s 'config."userinfo.token.claim"=true'
                else
                  "$KCADM" update "clients/$UUID/protocol-mappers/models/$MAPPER_ID" -r "$REALM" \
                    -s name=minio-policy \
                    -s protocol=openid-connect \
                    -s protocolMapper=oidc-hardcoded-claim-mapper \
                    -s 'config."claim.name"=policy' \
                    -s 'config."claim.value"=consoleAdmin' \
                    -s 'config."jsonType.label"=String' \
                    -s 'config."access.token.claim"=true' \
                    -s 'config."id.token.claim"=true' \
                    -s 'config."userinfo.token.claim"=true'
                fi
              }

              upsert_user

              # Grant master-realm admin to the bootstrap user (idempotent).
              "$KCADM" add-roles -r "$REALM" \
                --uusername "$KEYCLOAK_USER_USERNAME" \
                --rolename admin >/dev/null 2>&1 || true

              # Bump access-token lifespan from the 60s default to 15m so
              # idle browser tabs in Argo CD / MinIO / LiteLLM don't churn
              # through token-expired errors before the next API call.
              "$KCADM" update "realms/$REALM" -s accessTokenLifespan=900

              GLOBAL_UUID=$(upsert_client "$OIDC_CLIENT_ID" "$OIDC_CLIENT_SECRET" \
                '["https://vault.lowjungxuan.dpdns.org/ui/vault/auth/oidc/oidc/callback","http://localhost:8250/oidc/callback","https://argocd.lowjungxuan.dpdns.org/auth/callback","https://argocd.lowjungxuan.dpdns.org/*","argocd://auth/callback","http://localhost:8085/auth/callback","https://minio.lowjungxuan.dpdns.org/oauth_callback","https://minio.lowjungxuan.dpdns.org/*","https://s3.lowjungxuan.dpdns.org/oauth_callback","https://s3.lowjungxuan.dpdns.org/*","https://litellm.lowjungxuan.dpdns.org/sso/callback","https://litellm.lowjungxuan.dpdns.org/sso/debug/callback"]' \
                '["https://vault.lowjungxuan.dpdns.org","https://argocd.lowjungxuan.dpdns.org","https://minio.lowjungxuan.dpdns.org","https://s3.lowjungxuan.dpdns.org","https://litellm.lowjungxuan.dpdns.org"]')

              upsert_minio_policy_mapper "$GLOBAL_UUID"

              # Drop the temporary bootstrap admin so the Keycloak banner
              # clears. Re-auth as the permanent admin first (the temp
              # admin can't delete itself if it's the active session).
              # Keycloak won't re-create the temp admin on next start
              # because KEYCLOAK_USER_USERNAME still has the admin role.
              if [ "$KEYCLOAK_USER_USERNAME" != "$KEYCLOAK_ADMIN" ]; then
                TEMP_ADMIN_ID=$("$KCADM" get users -r "$REALM" \
                  -q username="$KEYCLOAK_ADMIN" --fields id \
                  --format csv --noquotes | head -n 1)
                if [ -n "$TEMP_ADMIN_ID" ]; then
                  "$KCADM" config credentials \
                    --server "$SERVER" --realm "$REALM" \
                    --user "$KEYCLOAK_USER_USERNAME" \
                    --password "$KEYCLOAK_USER_PASSWORD"
                  "$KCADM" delete "users/$TEMP_ADMIN_ID" -r "$REALM" \
                    >/dev/null 2>&1 || true
                fi
              fi
