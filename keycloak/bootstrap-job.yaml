apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-bootstrap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: quay.io/keycloak/keycloak:26.6.1
          envFrom:
            - secretRef:
                name: server-secret
          command:
            - /bin/sh
            - -ec
          args:
            - |
              KCADM=/opt/keycloak/bin/kcadm.sh
              SERVER=http://keycloak.infra.svc.cluster.local
              REALM=master
              BOOTSTRAP_USERNAME=${KEYCLOAK_BOOTSTRAP_USERNAME:-keycloak-gitops}
              BOOTSTRAP_PASSWORD=${KEYCLOAK_BOOTSTRAP_PASSWORD:-$KEYCLOAK_ADMIN_PASSWORD}

              login() {
                "$KCADM" config credentials \
                  --server "$SERVER" --realm "$REALM" \
                  --user "$1" \
                  --password "$2" >/dev/null 2>&1
              }

              login "$BOOTSTRAP_USERNAME" "$BOOTSTRAP_PASSWORD" \
                || login "$KEYCLOAK_ADMIN" "$KEYCLOAK_ADMIN_PASSWORD" \
                || login "$KEYCLOAK_USER_USERNAME" "$KEYCLOAK_USER_PASSWORD"

              upsert_user() {
                USERNAME=$1
                PASSWORD=$2
                EMAIL=${3:-}

                USER_ID=$("$KCADM" get users -r "$REALM" -q username="$USERNAME" --fields id --format csv --noquotes | head -n 1)
                if [ -z "$USER_ID" ] && [ -n "$EMAIL" ]; then
                  USER_ID=$("$KCADM" get users -r "$REALM" -q email="$EMAIL" --fields id --format csv --noquotes | head -n 1)
                fi
                if [ -z "$USER_ID" ]; then
                  "$KCADM" create users -r "$REALM" \
                    -s username="$USERNAME" \
                    -s enabled=true
                  USER_ID=$("$KCADM" get users -r "$REALM" -q username="$USERNAME" --fields id --format csv --noquotes | head -n 1)
                  if [ -n "$EMAIL" ]; then
                    "$KCADM" update "users/$USER_ID" -r "$REALM" \
                      -s email="$EMAIL" \
                      -s emailVerified=true
                  fi
                else
                  "$KCADM" update "users/$USER_ID" -r "$REALM" \
                    -s username="$USERNAME" \
                    -s enabled=true
                  if [ -n "$EMAIL" ]; then
                    "$KCADM" update "users/$USER_ID" -r "$REALM" \
                      -s email="$EMAIL" \
                      -s emailVerified=true
                  fi
                fi
                "$KCADM" set-password -r "$REALM" --userid "$USER_ID" --new-password "$PASSWORD"
              }

              grant_admin() {
                "$KCADM" add-roles -r "$REALM" \
                  --uusername "$1" \
                  --rolename admin >/dev/null 2>&1 || true
              }

              upsert_client() {
                CLIENT_ID=$1
                CLIENT_SECRET=$2
                REDIRECT_URIS=$3
                WEB_ORIGINS=$4
                UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$CLIENT_ID" --fields id --format csv --noquotes | head -n 1)
                if [ -z "$UUID" ]; then
                  "$KCADM" create clients -r "$REALM" \
                    -s clientId="$CLIENT_ID" \
                    -s enabled=true \
                    -s protocol=openid-connect \
                    -s publicClient=false \
                    -s clientAuthenticatorType=client-secret \
                    -s secret="$CLIENT_SECRET" \
                    -s standardFlowEnabled=true \
                    -s directAccessGrantsEnabled=true \
                    -s "redirectUris=$REDIRECT_URIS" \
                    -s "webOrigins=$WEB_ORIGINS" >&2
                  UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$CLIENT_ID" --fields id --format csv --noquotes | head -n 1)
                else
                  "$KCADM" update "clients/$UUID" -r "$REALM" \
                    -s enabled=true \
                    -s protocol=openid-connect \
                    -s publicClient=false \
                    -s clientAuthenticatorType=client-secret \
                    -s secret="$CLIENT_SECRET" \
                    -s standardFlowEnabled=true \
                    -s directAccessGrantsEnabled=true \
                    -s "redirectUris=$REDIRECT_URIS" \
                    -s "webOrigins=$WEB_ORIGINS" >&2
                fi
                printf '%s' "$UUID"
              }

              upsert_minio_policy_mapper() {
                UUID=$1
                MAPPER_ID=$("$KCADM" get "clients/$UUID/protocol-mappers/models" -r "$REALM" --fields id,name --format csv --noquotes | sed -n 's/,minio-policy$//p' | head -n 1)
                if [ -z "$MAPPER_ID" ]; then
                  "$KCADM" create "clients/$UUID/protocol-mappers/models" -r "$REALM" \
                    -s name=minio-policy \
                    -s protocol=openid-connect \
                    -s protocolMapper=oidc-hardcoded-claim-mapper \
                    -s 'config."claim.name"=policy' \
                    -s 'config."claim.value"=consoleAdmin' \
                    -s 'config."jsonType.label"=String' \
                    -s 'config."access.token.claim"=true' \
                    -s 'config."id.token.claim"=true' \
                    -s 'config."userinfo.token.claim"=true'
                else
                  "$KCADM" update "clients/$UUID/protocol-mappers/models/$MAPPER_ID" -r "$REALM" \
                    -s name=minio-policy \
                    -s protocol=openid-connect \
                    -s protocolMapper=oidc-hardcoded-claim-mapper \
                    -s 'config."claim.name"=policy' \
                    -s 'config."claim.value"=consoleAdmin' \
                    -s 'config."jsonType.label"=String' \
                    -s 'config."access.token.claim"=true' \
                    -s 'config."id.token.claim"=true' \
                    -s 'config."userinfo.token.claim"=true'
                fi
              }

              upsert_user "$BOOTSTRAP_USERNAME" "$BOOTSTRAP_PASSWORD" "${KEYCLOAK_BOOTSTRAP_EMAIL:-}"
              grant_admin "$BOOTSTRAP_USERNAME"

              upsert_user "$KEYCLOAK_USER_USERNAME" "$KEYCLOAK_USER_PASSWORD" "$KEYCLOAK_USER_EMAIL"
              grant_admin "$KEYCLOAK_USER_USERNAME"

              # Bump access-token lifespan from the 60s default to 15m so
              # idle browser tabs in Argo CD / MinIO / LiteLLM don't churn
              # through token-expired errors before the next API call.
              "$KCADM" update "realms/$REALM" -s accessTokenLifespan=900

              GLOBAL_UUID=$(upsert_client "$OIDC_CLIENT_ID" "$OIDC_CLIENT_SECRET" \
                '["https://vault.lowjungxuan.dpdns.org/ui/vault/auth/oidc/oidc/callback","http://localhost:8250/oidc/callback","https://argocd.lowjungxuan.dpdns.org/auth/callback","https://argocd.lowjungxuan.dpdns.org/*","argocd://auth/callback","http://localhost:8085/auth/callback","https://minio.lowjungxuan.dpdns.org/oauth_callback","https://minio.lowjungxuan.dpdns.org/*","https://s3.lowjungxuan.dpdns.org/oauth_callback","https://s3.lowjungxuan.dpdns.org/*","https://litellm.lowjungxuan.dpdns.org/sso/callback","https://litellm.lowjungxuan.dpdns.org/sso/debug/callback","https://resume.lowjungxuan.dpdns.org/api/auth/oauth2/callback/custom","https://resume.lowjungxuan.dpdns.org/*"]' \
                '["https://vault.lowjungxuan.dpdns.org","https://argocd.lowjungxuan.dpdns.org","https://minio.lowjungxuan.dpdns.org","https://s3.lowjungxuan.dpdns.org","https://litellm.lowjungxuan.dpdns.org","https://resume.lowjungxuan.dpdns.org"]')

              upsert_minio_policy_mapper "$GLOBAL_UUID"

              # Drop the temporary bootstrap admin so the Keycloak banner
              # clears. Re-auth as the permanent admin first (the temp
              # admin can't delete itself if it's the active session).
              # Future runs authenticate through BOOTSTRAP_USERNAME, so the
              # temporary recovery admin can be removed after bootstrap.
              if [ "$BOOTSTRAP_USERNAME" != "$KEYCLOAK_ADMIN" ]; then
                TEMP_ADMIN_ID=$("$KCADM" get users -r "$REALM" \
                  -q username="$KEYCLOAK_ADMIN" --fields id \
                  --format csv --noquotes | head -n 1)
                if [ -n "$TEMP_ADMIN_ID" ]; then
                  "$KCADM" config credentials \
                    --server "$SERVER" --realm "$REALM" \
                    --user "$BOOTSTRAP_USERNAME" \
                    --password "$BOOTSTRAP_PASSWORD"
                  "$KCADM" delete "users/$TEMP_ADMIN_ID" -r "$REALM" \
                    >/dev/null 2>&1 || true
                fi
              fi
