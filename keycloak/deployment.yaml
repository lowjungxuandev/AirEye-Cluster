apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.6.1
          args:
            - start
            - --http-enabled=true
            - --http-port=8080
            - --hostname-strict=false
            - --proxy-headers=xforwarded
          envFrom:
            - secretRef:
                name: server-secret
          env:
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: JAVA_OPTS_KC_HEAP
              value: "-XX:InitialRAMPercentage=25 -XX:MaxRAMPercentage=60"
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: KEYCLOAK_DB_PASSWORD
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: 512Mi
              cpu: 400m
            limits:
              memory: 1024Mi
