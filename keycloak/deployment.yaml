apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.6.1
          args:
            - start
            - --http-enabled=true
            - --http-port=8080
            - --hostname-strict=false
            - --proxy-headers=xforwarded
          envFrom:
            - secretRef:
                name: server-secret
          env:
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: KEYCLOAK_DB_PASSWORD
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 2Gi
              cpu: "1"
