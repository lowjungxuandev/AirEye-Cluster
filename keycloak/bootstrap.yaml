apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: quay.io/keycloak/keycloak:26.6.1
          envFrom:
            - secretRef:
                name: server-secret
          command:
            - /bin/sh
            - -ec
          args:
            - |
              KCADM=/opt/keycloak/bin/kcadm.sh
              SERVER=http://keycloak.infra.svc.cluster.local
              REALM=master

              "$KCADM" config credentials \
                --server "$SERVER" \
                --realm "$REALM" \
                --user "$KEYCLOAK_ADMIN" \
                --password "$KEYCLOAK_ADMIN_PASSWORD"

              upsert_user() {
                USER_ID=$("$KCADM" get users -r "$REALM" -q username="$KEYCLOAK_USER_USERNAME" --fields id --format csv --noquotes | head -n 1)
                if [ -z "$USER_ID" ]; then
                  USER_ID=$("$KCADM" get users -r "$REALM" -q email="$KEYCLOAK_USER_EMAIL" --fields id --format csv --noquotes | head -n 1)
                fi
                if [ -z "$USER_ID" ]; then
                  "$KCADM" create users -r "$REALM" \
                    -s username="$KEYCLOAK_USER_USERNAME" \
                    -s enabled=true \
                    -s email="$KEYCLOAK_USER_EMAIL" \
                    -s emailVerified=true
                  USER_ID=$("$KCADM" get users -r "$REALM" -q username="$KEYCLOAK_USER_USERNAME" --fields id --format csv --noquotes | head -n 1)
                else
                  "$KCADM" update "users/$USER_ID" -r "$REALM" \
                    -s username="$KEYCLOAK_USER_USERNAME" \
                    -s email="$KEYCLOAK_USER_EMAIL" \
                    -s emailVerified=true \
                    -s enabled=true
                fi
                "$KCADM" set-password -r "$REALM" --userid "$USER_ID" --new-password "$KEYCLOAK_USER_PASSWORD"
              }

              upsert_client() {
                CLIENT_ID=$1
                CLIENT_SECRET=$2
                REDIRECT_URIS=$3
                WEB_ORIGINS=$4
                UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$CLIENT_ID" --fields id --format csv --noquotes | head -n 1)
                if [ -z "$UUID" ]; then
                  "$KCADM" create clients -r "$REALM" \
                    -s clientId="$CLIENT_ID" \
                    -s enabled=true \
                    -s protocol=openid-connect \
                    -s publicClient=false \
                    -s secret="$CLIENT_SECRET" \
                    -s standardFlowEnabled=true \
                    -s directAccessGrantsEnabled=true \
                    -s "redirectUris=$REDIRECT_URIS" \
                    -s "webOrigins=$WEB_ORIGINS"
                  UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$CLIENT_ID" --fields id --format csv --noquotes | head -n 1)
                else
                  "$KCADM" update "clients/$UUID" -r "$REALM" \
                    -s enabled=true \
                    -s publicClient=false \
                    -s secret="$CLIENT_SECRET" \
                    -s standardFlowEnabled=true \
                    -s directAccessGrantsEnabled=true \
                    -s "redirectUris=$REDIRECT_URIS" \
                    -s "webOrigins=$WEB_ORIGINS"
                fi
                printf '%s' "$UUID"
              }

              upsert_minio_policy_mapper() {
                UUID=$1
                MAPPER_ID=$("$KCADM" get "clients/$UUID/protocol-mappers/models" -r "$REALM" --fields id,name --format csv --noquotes | sed -n 's/,minio-policy$//p' | head -n 1)
                if [ -z "$MAPPER_ID" ]; then
                  "$KCADM" create "clients/$UUID/protocol-mappers/models" -r "$REALM" \
                    -s name=minio-policy \
                    -s protocol=openid-connect \
                    -s protocolMapper=oidc-hardcoded-claim-mapper \
                    -s 'config."claim.name"=policy' \
                    -s 'config."claim.value"=consoleAdmin' \
                    -s 'config."jsonType.label"=String' \
                    -s 'config."access.token.claim"=true' \
                    -s 'config."id.token.claim"=true' \
                    -s 'config."userinfo.token.claim"=true'
                else
                  "$KCADM" update "clients/$UUID/protocol-mappers/models/$MAPPER_ID" -r "$REALM" \
                    -s name=minio-policy \
                    -s protocol=openid-connect \
                    -s protocolMapper=oidc-hardcoded-claim-mapper \
                    -s 'config."claim.name"=policy' \
                    -s 'config."claim.value"=consoleAdmin' \
                    -s 'config."jsonType.label"=String' \
                    -s 'config."access.token.claim"=true' \
                    -s 'config."id.token.claim"=true' \
                    -s 'config."userinfo.token.claim"=true'
                fi
              }

              upsert_user

              upsert_client "$OIDC_CLIENT_ID" "$OIDC_CLIENT_SECRET" \
                '["https://vault.lowjungxuan.dpdns.org/ui/vault/auth/oidc/oidc/callback","http://localhost:8250/oidc/callback"]' \
                '["https://vault.lowjungxuan.dpdns.org"]'

              upsert_client "$ARGOCD_OIDC_CLIENT_ID" "$ARGOCD_OIDC_CLIENT_SECRET" \
                '["https://argocd.lowjungxuan.dpdns.org/auth/callback"]' \
                '["https://argocd.lowjungxuan.dpdns.org"]'

              MINIO_UUID=$(upsert_client "$MINIO_OIDC_CLIENT_ID" "$MINIO_OIDC_CLIENT_SECRET" \
                '["https://minio.lowjungxuan.dpdns.org/oauth_callback"]' \
                '["https://minio.lowjungxuan.dpdns.org"]')

              upsert_minio_policy_mapper "$MINIO_UUID"
