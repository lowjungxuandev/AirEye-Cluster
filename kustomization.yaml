apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: infra

resources:
  - namespace.yaml
  - vault-secrets-operator
  - postgres
  - redis
  - keycloak
  - minio
  - aireye-app
  - litellm
  - resume

images:
  - name: ghcr.io/lowjungxuan98/aireye/backend
    newTag: 0.2.12

labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      app.kubernetes.io/part-of: aireye-cluster
      app.kubernetes.io/managed-by: argocd

patches:
  - target:
      kind: (Deployment|StatefulSet|Job|DaemonSet)
    patch: |-
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
  - target:
      kind: CronJob
    patch: |-
      - op: add
        path: /spec/jobTemplate/spec/template/spec/tolerations
        value:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
