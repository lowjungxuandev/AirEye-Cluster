apiVersion: batch/v1
kind: Job
metadata:
  name: redis-smoke-test
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
      containers:
        - name: redis-smoke-test
          image: redis:8-alpine
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until redis-cli -h redis -a "$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG; do
                sleep 5
              done
              redis-cli -h redis -a "$REDIS_PASSWORD" --no-auth-warning set grim-k8s:redis-smoke ok
              redis-cli -h redis -a "$REDIS_PASSWORD" --no-auth-warning get grim-k8s:redis-smoke | grep -q '^ok$'
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: REDIS_PASSWORD
