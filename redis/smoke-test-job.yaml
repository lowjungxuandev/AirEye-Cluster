apiVersion: batch/v1
kind: Job
metadata:
  name: redis-smoke-test
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: redis-smoke-test
          image: redis:8-alpine
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until redis-cli -h redis -a "$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG; do
                sleep 5
              done
              redis-cli -h redis -a "$REDIS_PASSWORD" --no-auth-warning set aireye-cluster:redis-smoke ok
              redis-cli -h redis -a "$REDIS_PASSWORD" --no-auth-warning get aireye-cluster:redis-smoke | grep -q '^ok$'
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
